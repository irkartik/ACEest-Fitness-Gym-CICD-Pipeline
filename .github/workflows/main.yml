name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --statistics --count

  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aceest-fitness:${{ github.sha }} .

  automated-testing:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aceest-fitness:test .

      - name: Run Pytest inside container
        run: docker run --rm aceest-fitness:test python -m pytest tests/ -v --tb=short
