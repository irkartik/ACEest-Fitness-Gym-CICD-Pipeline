name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USER: rajujha373
  IMAGE_NAME: aceest-fitness-github

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --statistics --count

  automated-testing:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for testing
        run: docker build -t aceest-fitness:test .

      - name: Run Pytest inside container
        run: docker run --rm aceest-fitness:test python -m pytest tests/ -v --tb=short

  docker-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: automated-testing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: rajujha373/aceest-fitness-github
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ github.run_number }}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Print pushed tags
        run: echo "Pushed tags -- ${{ steps.meta.outputs.tags }}"

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: automated-testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.projectKey=irkartik_ACEest-Fitness-Gym-CICD-Pipeline
            -Dsonar.organization=irkartik
            -Dsonar.sources=app
            -Dsonar.tests=tests
            -Dsonar.python.version=3.12
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
