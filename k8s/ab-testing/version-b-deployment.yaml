apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-version-b
  labels:
    app: aceest-fitness
    variant: version-b
    strategy: ab-testing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      variant: version-b
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: version-b
        version: v2.0
    spec:
      containers:
        - name: aceest-fitness
          image: aceest-fitness:v2.0
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: ACEEST_DB
              value: /data/aceest_fitness.db
            - name: APP_VARIANT
              value: "B"
          volumeMounts:
            - name: db-storage
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: db-storage
          emptyDir: {}
