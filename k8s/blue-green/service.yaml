apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-svc
  labels:
    app: aceest-fitness
    strategy: blue-green
  annotations:
    # To switch traffic: kubectl patch svc aceest-fitness-svc -p '{"spec":{"selector":{"slot":"green"}}}'
    # To rollback:       kubectl patch svc aceest-fitness-svc -p '{"spec":{"selector":{"slot":"blue"}}}'
    deployment.kubernetes.io/active-slot: "blue"
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    slot: blue   # Change to "green" to cut-over traffic to the new version
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30081
