apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-svc
  labels:
    app: aceest-fitness
    strategy: canary
  annotations:
    # The service selects ALL pods with app=aceest-fitness (both stable and canary).
    # Kubernetes distributes traffic proportionally to replica count:
    #   stable=4 replicas → ~80% traffic
    #   canary=1 replica  → ~20% traffic
    #
    # To promote canary to full production:
    #   kubectl scale deployment aceest-fitness-canary --replicas=4
    #   kubectl scale deployment aceest-fitness-stable --replicas=0
    # To abort canary rollout:
    #   kubectl scale deployment aceest-fitness-canary --replicas=0
spec:
  type: NodePort
  selector:
    app: aceest-fitness   # Intentionally no "track" label — selects both stable + canary
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30082
