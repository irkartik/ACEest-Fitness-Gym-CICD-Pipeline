apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-shadow
  labels:
    app: aceest-fitness
    tier: shadow
    strategy: shadow
  annotations:
    # Shadow deployments receive a mirrored copy of production traffic.
    # True traffic mirroring requires a service mesh (e.g. Istio with mirror + mirrorPercent).
    # Without a mesh, this deployment runs the new version in parallel for comparison.
    # Shadow responses are discarded — users only see production responses.
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      tier: shadow
  template:
    metadata:
      labels:
        app: aceest-fitness
        tier: shadow
        version: v2.0
    spec:
      containers:
        - name: aceest-fitness
          image: aceest-fitness:v2.0
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: ACEEST_DB
              value: /data/aceest_fitness.db
            - name: SHADOW_MODE
              value: "true"
          volumeMounts:
            - name: db-storage
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: db-storage
          emptyDir: {}
